version: '3.8'

services:
  # ============================================
  # DATABASE - PostgreSQL
  # ============================================
  valiryart-db:
    image: postgres:15-alpine
    container_name: valiryart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: valiryart_user
      POSTGRES_PASSWORD: ValiryArt2025!Secure
      POSTGRES_DB: valiryart
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    # NESSUNA PORTA ESPOSTA - solo rete interna per sicurezza
    # ports:
    #   - "5433:5432"  # COMMENTATO per sicurezza - DB non esposto
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - valiryart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valiryart_user -d valiryart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND - Node.js + Express
  # ============================================
  valiryart-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valiryart-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      
      # Database
      DB_HOST: valiryart-db
      DB_PORT: 5432
      DB_NAME: valiryart
      DB_USER: valiryart_user
      DB_PASSWORD: ValiryArt2025!Secure
      
      # JWT
      JWT_SECRET: valiryart_jwt_secret_change_in_production_2025_xyz
      JWT_EXPIRES_IN: 7d
      
      # Google OAuth (sostituire con credenziali reali)
      GOOGLE_CLIENT_ID: YOUR_GOOGLE_CLIENT_ID_HERE
      GOOGLE_CLIENT_SECRET: YOUR_GOOGLE_CLIENT_SECRET_HERE
      GOOGLE_CALLBACK_URL: http://localhost/api/auth/google/callback
      
      # Email SMTP (sostituire con credenziali reali Gmail)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: valeria.valiryart@gmail.com
      SMTP_PASS: your_gmail_app_password_here
      EMAIL_FROM: noreply@valiryart.it
      
      # Upload
      UPLOAD_MAX_SIZE: 10485760  # 10MB
      UPLOAD_PATH: /app/uploads
      
      # CORS
      FRONTEND_URL: http://localhost
      
    # NESSUNA PORTA ESPOSTA - solo via NGINX
    # ports:
    #   - "5001:5000"  # COMMENTATO - backend accessibile solo via nginx
    volumes:
      - ./backend:/app
      - /app/node_modules  # Evita conflitti con node_modules locale
      - ./backend/uploads:/app/uploads
    depends_on:
      valiryart-db:
        condition: service_healthy
    networks:
      - valiryart-network
    command: npm run dev

  # ============================================
  # FRONTEND - React
  # ============================================
  valiryart-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: valiryart-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: http://localhost:8081/api
      REACT_APP_GOOGLE_CLIENT_ID: 354246551290-48i5raeb05pt59d08u8rfdd3spm51ek9.apps.googleusercontent.com
      CHOKIDAR_USEPOLLING: true  # Per hot-reload su Windows
    # NESSUNA PORTA ESPOSTA - solo via NGINX
    # ports:
    #   - "3001:3000"  # COMMENTATO - frontend accessibile solo via nginx
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - valiryart-network
    stdin_open: true
    tty: true
    command: npm start

  # ============================================
  # NGINX - Reverse Proxy
  # ============================================
  valiryart-nginx:
    image: nginx:alpine
    container_name: valiryart-nginx
    restart: unless-stopped
    ports:
      - "8081:80"      # HTTP
      - "8443:443"    # HTTPS (per futuro)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./backend/uploads:/usr/share/nginx/html/uploads:ro  # Serve static files
    depends_on:
      - valiryart-backend
      - valiryart-frontend
    networks:
      - valiryart-network

# ============================================
# NETWORKS
# ============================================
networks:
  valiryart-network:
    driver: bridge

# ============================================
# VOLUMES (opzionale, per backup)
# ============================================
volumes:
  postgres-data:
    driver: local